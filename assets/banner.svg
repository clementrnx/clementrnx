<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#031a08"/>
    </linearGradient>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>

    <style>
      .grid-line { stroke:#0f4d1a; stroke-width:1; opacity:0.3; }
      .title { font-family: 'Courier New', monospace; font-weight:700; fill:#39ff14; }
      .subtitle { font-family: 'Courier New', monospace; fill:#7CFC00; opacity:0.9; }
      .bracket { font-family: 'Courier New', monospace; fill:#0aff0a; }

      @keyframes flicker {
        0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
        20%, 24%, 55% { opacity: 0.55; }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes pulseStroke {
        0%   { stroke-opacity: 0.45; }
        50%  { stroke-opacity: 1; }
        100% { stroke-opacity: 0.45; }
      }
      @keyframes pulseDot {
        0%   { r: 4; opacity: 1; }
        70%  { r: 11; opacity: 0; }
        100% { r: 11; opacity: 0; }
      }
      #mainTitle { animation: flicker 4s infinite; }
      #cursor { animation: blink 1s steps(1) infinite; }
      .open-pill { animation: pulseStroke 2s ease-in-out infinite; }
      .open-ping { animation: pulseDot 1.6s ease-out infinite; }
    </style>
  </defs>

  <rect width="900" height="200" fill="url(#bgGrad)"/>

  <g>
    <line class="grid-line" x1="0" y1="30" x2="900" y2="30"/>
    <line class="grid-line" x1="0" y1="60" x2="900" y2="60"/>
    <line class="grid-line" x1="0" y1="90" x2="900" y2="90"/>
    <line class="grid-line" x1="0" y1="120" x2="900" y2="120"/>
    <line class="grid-line" x1="0" y1="150" x2="900" y2="150"/>
    <line class="grid-line" x1="0" y1="180" x2="900" y2="180"/>
    <line class="grid-line" x1="60" y1="0" x2="60" y2="200"/>
    <line class="grid-line" x1="180" y1="0" x2="180" y2="200"/>
    <line class="grid-line" x1="300" y1="0" x2="300" y2="200"/>
    <line class="grid-line" x1="420" y1="0" x2="420" y2="200"/>
    <line class="grid-line" x1="540" y1="0" x2="540" y2="200"/>
    <line class="grid-line" x1="660" y1="0" x2="660" y2="200"/>
    <line class="grid-line" x1="780" y1="0" x2="780" y2="200"/>
  </g>

  <rect x="0" y="-40" width="900" height="40" fill="url(#scanGrad)">
    <animate attributeName="y" from="-40" to="200" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="8" y="8" width="884" height="184" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.6" filter="url(#neonGlow)"/>

  <text class="bracket" x="30" y="60" font-size="26">&lt;</text>
  <text id="mainTitle" class="title" x="60" y="95" font-size="46" filter="url(#neonGlow)">CLÉMENT RENAUX</text>
  <text class="bracket" x="640" y="95" font-size="46">/&gt;</text>

  <text class="subtitle" x="60" y="128" font-size="18">&gt; EPITA Lyon · promo 2028 · Développement et Industrie du Futur<tspan id="cursor">_</tspan></text>

  <g transform="translate(60, 148)">
    <rect x="0" y="0" width="430" height="34" rx="17" fill="#000000"/>
    <rect class="open-pill" x="0" y="0" width="430" height="34" rx="17" fill="none" stroke="#39ff14" stroke-width="1.6" filter="url(#neonGlow)"/>
    <circle cx="20" cy="17" r="4" fill="#39ff14" filter="url(#neonGlow)"/>
    <circle class="open-ping" cx="20" cy="17" r="4" fill="none" stroke="#39ff14" stroke-width="1.6"/>
    <text x="36" y="22" font-family="Courier New, monospace" font-weight="700" font-size="14" letter-spacing="0.5" fill="#39ff14" filter="url(#softGlow)">OPEN TO SOFTWARE DEVELOPER INTERNSHIP</text>
  </g>
</svg>
