<svg width="900" height="290" viewBox="0 0 900 290" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .code { font-family: 'Courier New', monospace; font-size: 15px; fill: #39ff14; }
      .dim  { font-family: 'Courier New', monospace; font-size: 15px; fill: #1f8c1f; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="288" rx="10" fill="#000000"/>
  <rect x="1" y="1" width="898" height="288" rx="10" fill="none" stroke="#39ff14" stroke-width="1.4" opacity="0.6"/>

  <line x1="1" y1="40" x2="899" y2="40" stroke="#0f4d1a" stroke-width="1"/>
  <circle cx="26" cy="20" r="6" fill="none" stroke="#39ff14" stroke-width="1.4"/>
  <circle cx="48" cy="20" r="6" fill="none" stroke="#39ff14" stroke-width="1.4"/>
  <circle cx="70" cy="20" r="6" fill="none" stroke="#39ff14" stroke-width="1.4"/>
  <text class="dim pulse" x="400" y="25" font-size="13">whoami.js</text>

  <g filter="url(#glow)">
    <text class="dim" x="24" y="72">&gt;</text>
    <text class="code" x="42" y="72">const dev = {</text>

    <text class="code" x="42" y="100">  name: <tspan class="dim">"Clément Renaux"</tspan>,</text>
    <text class="code" x="42" y="128">  school: <tspan class="dim">"EPITA Lyon — Développement et Industrie du Futur"</tspan>,</text>
    <text class="code" x="42" y="156">  focus: [<tspan class="dim">"compilers", "backend APIs", "systems programming"</tspan>],</text>
    <text class="code" x="42" y="184">  lookingFor: <tspan class="dim">"6-month software dev internship, EU, Sept 2026"</tspan>,</text>
    <text class="code" x="42" y="212">  currentlyBuilding: <tspan class="dim">"a Tiger compiler with generics (turbofish syntax)"</tspan>,</text>
    <text class="code" x="42" y="240">  funFact: <tspan class="dim">"will happily debate FC Barcelona tactics or UFC fight cards"</tspan></text>

    <text class="code" x="42" y="268">};</text>
  </g>
</svg>
